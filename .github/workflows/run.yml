name: 定时获取恒生科技操作建议

on:
  schedule:
    # 每天 北京时间 09:30
    - cron: '30 9 * * *'
    # 每天 北京时间 11:30
    - cron: '30 11 * * *'
    # 每天 北京时间 13:30
    - cron: '30 13 * * *'
    # 每天 北京时间 14:45
    - cron: '45 14 * * *'
    # 每天 北京时间 16:00
    - cron: '0 16 * * *'
    # 每天 北京时间 20:00
    - cron: '0 20 * * *'
      timezone: 'Asia/Shanghai'
    
  # 允许手动点击运行
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      SENDER_AUTH_CODE: ${{ secrets.SENDER_AUTH_CODE }}
      RECV_EMAIL: ${{ secrets.RECV_EMAIL }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 运行脚本
        run: python hstech-model.py
