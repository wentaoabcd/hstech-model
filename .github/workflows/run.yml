name: 定时获取恒生科技操作建议

on:
  schedule:
    - cron: '55 8 * * 1-5'
    - cron: '55 9 * * 1-5'
    - cron: '55 10 * * 1-5'
    - cron: '55 11 * * 1-5'
    - cron: '55 12 * * 1-5'
    - cron: '55 13 * * 1-5'
    - cron: '55 14 * * 1-5'
    - cron: '55 15 * * 1-5'
    - cron: '55 16 * * 1-5'
    - cron: '55 17 * * 1-5'
    - cron: '55 18 * * 1-5'
    - cron: '55 19 * * 1-5'
    - cron: '55 20 * * 1-5'
      timezone: 'Asia/Shanghai'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      SENDER_AUTH_CODE: ${{ secrets.SENDER_AUTH_CODE }}
      RECV_EMAIL: ${{ secrets.RECV_EMAIL }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 运行脚本
        run: python hstech-model.py
